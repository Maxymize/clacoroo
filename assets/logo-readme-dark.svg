<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="600" height="340" viewBox="0 0 600 340">
  <!-- CLACOROO — README hero logo v2.
       Top: app icon ufficiale (icon_256x256.png) scaled 200×200.
       Sotto: wordmark CLACOROO BOLD pixel-art (stesse glyph DMG installer). -->

  <defs>
    <!-- Pixel font glyphs 7×7 BOLD (Press Start 2P inspired) -->
    <symbol id="g-C" viewBox="0 0 7 7">
      <rect x="1" y="0" width="5" height="1"/>
      <rect x="0" y="1" width="2" height="5"/>
      <rect x="5" y="1" width="2" height="1"/>
      <rect x="5" y="5" width="2" height="1"/>
      <rect x="1" y="6" width="5" height="1"/>
    </symbol>
    <symbol id="g-L" viewBox="0 0 7 7">
      <rect x="0" y="0" width="2" height="7"/>
      <rect x="2" y="5" width="5" height="2"/>
    </symbol>
    <symbol id="g-A" viewBox="0 0 7 7">
      <rect x="1" y="0" width="5" height="1"/>
      <rect x="0" y="1" width="2" height="6"/>
      <rect x="5" y="1" width="2" height="6"/>
      <rect x="2" y="3" width="3" height="1"/>
    </symbol>
    <symbol id="g-O" viewBox="0 0 7 7">
      <rect x="1" y="0" width="5" height="1"/>
      <rect x="0" y="1" width="2" height="5"/>
      <rect x="5" y="1" width="2" height="5"/>
      <rect x="1" y="6" width="5" height="1"/>
    </symbol>
    <symbol id="g-R" viewBox="0 0 7 7">
      <rect x="0" y="0" width="5" height="1"/>
      <rect x="0" y="1" width="2" height="6"/>
      <rect x="5" y="1" width="2" height="2"/>
      <rect x="1" y="3" width="4" height="1"/>
      <rect x="3" y="4" width="2" height="1"/>
      <rect x="4" y="5" width="2" height="1"/>
      <rect x="5" y="6" width="2" height="1"/>
    </symbol>
  </defs>

  <!-- App icon ufficiale (mascotte + black rounded square background dell'app).
       Scaled 256→200, centrata a x=300 → x_left=200, y=10. -->
  <image x="200" y="10" width="200" height="200"
         xlink:href="icon-app-256.png"
         href="icon-app-256.png"/>

  <!-- Wordmark CLACOROO BOLD pixel-art.
       Glyph 28×28 (scale 4× da 7×7) + gap 6px. Width = 8*28+7*6 = 266.
       Centro x=300 → start x=167. Offsets: +34px ogni glyph. -->
  <g shape-rendering="crispEdges">
    <g fill="#faf9f5">
      <use href="#g-C" x="167" y="240" width="28" height="28"/>
      <use href="#g-L" x="201" y="240" width="28" height="28"/>
      <use href="#g-A" x="235" y="240" width="28" height="28"/>
    </g>
    <g fill="#d97757">
      <use href="#g-C" x="269" y="240" width="28" height="28"/>
      <use href="#g-O" x="303" y="240" width="28" height="28"/>
    </g>
    <g fill="#faf9f5">
      <use href="#g-R" x="337" y="240" width="28" height="28"/>
      <use href="#g-O" x="371" y="240" width="28" height="28"/>
      <use href="#g-O" x="405" y="240" width="28" height="28"/>
    </g>
  </g>

  <!-- Tagline -->
  <text x="300" y="305"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="14"
        font-weight="500"
        fill="#a8a299"
        text-anchor="middle"
        letter-spacing="0.05em">
    CLAude COde COntrol ROom
  </text>
</svg>

# CLACOROO — funding channels
# Used by GitHub to render the "Sponsor" banner in the repo sidebar.
# Docs: https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/displaying-a-sponsor-button-in-your-repository
#
# All channels active — give donors a real choice (GitHub Sponsors for devs,
# Buy Me a Coffee for community/creators, PayPal for traditional/IT users).

github: [Maxymize]
buy_me_a_coffee: maxymize
custom: ["https://paypal.me/maxymizebusiness"]

# Not planned:
# ko_fi: maxymize                 # alternative to BMAC, redundant
# liberapay: maxymize             # zero-fee but low volume in IT
# open_collective: clacoroo       # only if multi-contributor project

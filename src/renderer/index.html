<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'">
  <title>CLACOROO — Claude Code Control Room</title>
  <link rel="stylesheet" href="vendor/xterm/xterm.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="app-brand">
          <div class="brand-mascot" aria-hidden="true">
            <img class="mascot-base"  src="clacoroo.svg"       alt="" />
            <img class="mascot-blink" src="clacoroo-blink.svg" alt="" />
          </div>
          <div class="brand-text">
            <span class="brand-name">CLA<span class="brand-name-mark">CO</span>ROO</span>
            <span class="brand-subtitle">CLAude-code COntrol ROom</span>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <!-- v1.0.84 — Icone Lucide (lucide.dev, MIT). viewBox 24×24, stile stroke
             uniforme. Attributi stroke/fill/stroke-width centralizzati in .nav-icon CSS. -->
        <button class="nav-item active" data-section="dashboard">
          <!-- layout-dashboard -->
          <svg class="nav-icon" viewBox="0 0 24 24"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
          <span class="nav-label" data-i18n="nav.dashboard">Dashboard</span>
        </button>
        <button class="nav-item" data-section="marketplaces">
          <!-- store -->
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M2 7h20"/><path d="M4 4v3"/><path d="M20 4v3"/><path d="M5 22V11"/><path d="M19 22V11"/><path d="M5 11h14"/><path d="M9 22v-6h6v6"/></svg>
          <span class="nav-label" data-i18n="nav.marketplace">Marketplace</span>
        </button>
        <button class="nav-item" data-section="plugins">
          <!-- puzzle -->
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19.439 7.85c-.049.322.059.648.289.878l1.568 1.568c.47.47.706 1.087.706 1.704s-.235 1.233-.706 1.704l-1.611 1.611a.98.98 0 0 1-.837.276c-.47-.07-.802-.48-.968-.925a2.501 2.501 0 1 0-3.214 3.214c.446.166.855.497.925.968a.979.979 0 0 1-.276.837l-1.61 1.61a2.404 2.404 0 0 1-1.705.707 2.402 2.402 0 0 1-1.704-.706l-1.568-1.568a1.026 1.026 0 0 0-.877-.29c-.493.074-.84.504-1.02.968a2.5 2.5 0 1 1-3.237-3.237c.464-.18.894-.527.967-1.02a1.026 1.026 0 0 0-.289-.877l-1.568-1.568A2.402 2.402 0 0 1 1.998 12c0-.617.236-1.234.706-1.704L4.23 8.77c.24-.24.581-.353.917-.303.515.077.877.528 1.073 1.01a2.5 2.5 0 1 0 3.259-3.259c-.482-.196-.933-.558-1.01-1.073-.05-.336.062-.676.303-.917l1.525-1.525A2.402 2.402 0 0 1 12 2c.617 0 1.234.236 1.704.706l1.568 1.568c.23.23.556.338.877.29.493-.074.84-.504 1.02-.968a2.5 2.5 0 1 1 3.237 3.237c-.464.18-.894.527-.967 1.02Z"/></svg>
          <span class="nav-label" data-i18n="nav.plugin">Plugin</span>
          <span class="nav-badge" id="nav-badge-plugins"></span>
        </button>
        <button class="nav-item" data-section="skills">
          <!-- sparkles -->
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg>
          <span class="nav-label" data-i18n="nav.skill">Skill</span>
        </button>
        <button class="nav-item" data-section="agents">
          <!-- bot -->
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
          <span class="nav-label" data-i18n="nav.agent">Agent</span>
        </button>
        <button class="nav-item" data-section="mcp">
          <!-- plug-2 (presa elettrica con 2 pin verticali + cavo) -->
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M9 2v6"/><path d="M15 2v6"/><path d="M12 17v3"/><path d="M5 8h14"/><path d="M6 11V8h12v3a6 6 0 0 1-12 0Z"/></svg>
          <span class="nav-label" data-i18n="nav.mcp">MCP</span>
        </button>
        <button class="nav-item" data-section="hooks">
          <!-- anchor (ancora classica: occhiello + asta + curva U) — leggibile come "hook" -->
          <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></svg>
          <span class="nav-label" data-i18n="nav.hooks">Hooks</span>
        </button>
        <button class="nav-item" data-section="stats">
          <!-- bar-chart-3 -->
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
          <span class="nav-label" data-i18n="nav.stats">Stats</span>
        </button>
        <button class="nav-item" data-section="config">
          <!-- sliders-horizontal -->
          <svg class="nav-icon" viewBox="0 0 24 24"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg>
          <span class="nav-label" data-i18n="nav.config">Claude Config</span>
        </button>
        <button class="nav-item" data-section="settings">
          <!-- settings (gear) -->
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          <span class="nav-label" data-i18n="nav.settings">Impostazioni</span>
        </button>
      </nav>

      <div class="sidebar-recent" id="sidebar-recent" aria-label="Attività recenti"></div>

      <div class="sidebar-footer">
        <!-- v1.0.76 — Supporta CLACOROO: 3 mini-bottoni sempre visibili (GitHub Sponsors, BMAC, PayPal) -->
        <div class="sidebar-support" id="sidebar-support" data-i18n-aria="sidebar.supportAriaWrap" aria-label="Support CLACOROO">
          <div class="sidebar-support-head">
            <span class="sidebar-support-label" data-i18n="sidebar.support">Support</span>
            <span class="sidebar-support-sub" data-i18n="sidebar.supportSub">Se questa applicazione ti è utile, considera di supportare il progetto con una donazione.</span>
          </div>
          <div class="sidebar-support-row">
            <button type="button" class="sidebar-support-btn ssb-github" data-url="https://github.com/sponsors/Maxymize" data-i18n-title="sidebar.tipGithub" data-i18n-aria="sidebar.ariaGithub" title="Sponsor on GitHub (GitHub matches 1:1 in the first 12 months)" aria-label="Sponsor on GitHub">
              <img src="support-github.png" alt="" class="ssb-logo" aria-hidden="true">
            </button>
            <button type="button" class="sidebar-support-btn ssb-bmac" data-url="https://buymeacoffee.com/maxymize" data-i18n-title="sidebar.tipBmac" data-i18n-aria="sidebar.ariaBmac" title="Buy me a coffee" aria-label="Buy Me a Coffee">
              <img src="support-bmac.png" alt="" class="ssb-logo" aria-hidden="true">
            </button>
            <button type="button" class="sidebar-support-btn ssb-paypal" data-url="https://paypal.me/maxymizebusiness" data-i18n-title="sidebar.tipPaypal" data-i18n-aria="sidebar.ariaPaypal" title="Donate via PayPal" aria-label="Donate via PayPal">
              <img src="support-paypal.png" alt="" class="ssb-logo" aria-hidden="true">
            </button>
          </div>
        </div>
        <!-- v1.1.20 — Account Claude (MAX + email) spostato sotto Support, sopra la versione -->
        <div class="sidebar-account" id="sidebar-account" aria-label="Account Claude"></div>
        <!-- v1.1.20 — Indicatore versione spostato in fondo, dopo Support e Account -->
        <div class="sidebar-status" id="sidebar-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-label">Caricamento…</span>
        </div>
        <!-- v1.1.23 — Pulsante Feedback: apre il form su clacoroo.app/feedback -->
        <button type="button" class="sidebar-feedback-btn" id="feedback-btn"
                data-i18n="feedback.button"
                data-i18n-title="feedback.button"
                data-i18n-aria="feedback.button"
                aria-label="Feedback">Feedback</button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main-area">
      <header class="topbar" id="topbar">
        <div class="topbar-title" id="topbar-title">Dashboard</div>
        <div class="topbar-updated" id="topbar-updated"></div>
        <div class="topbar-actions" id="topbar-actions"></div>
      </header>

      <div class="content-area" id="content-area">
        <div class="loading-screen" id="loading-screen">
          <img class="loading-mascot" src="clacoroo.svg" alt="" aria-hidden="true" />
          <p>CLACOROO sta accendendo la control room…</p>
        </div>
      </div>

      <!-- v1.0.67 — Terminal drawer (Pack B): drawer fisso in basso, multi-tab -->
      <div class="terminal-drawer" id="terminal-drawer" data-open="false" aria-hidden="true">
        <div class="terminal-drawer-resizer" id="terminal-drawer-resizer" title="Trascina per ridimensionare"></div>
        <div class="terminal-drawer-header">
          <div class="terminal-drawer-tabs" id="terminal-drawer-tabs"></div>
          <div class="terminal-drawer-actions">
            <button class="terminal-drawer-btn" id="terminal-drawer-newtab" title="Nuova tab (Cmd+T)" data-tt="Nuova tab">+</button>
            <button class="terminal-drawer-btn" id="terminal-drawer-close" title="Chiudi terminale (Cmd+`)" data-tt="Chiudi terminale">×</button>
          </div>
        </div>
        <div class="terminal-drawer-body" id="terminal-drawer-body"></div>
      </div>
    </main>
  </div>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toast-container"></div>

  <!-- v1.0.67 — xterm.js vendored (cfr. src/renderer/vendor/xterm/) -->
  <script src="vendor/xterm/xterm.js"></script>
  <script src="vendor/xterm/addon-fit.js"></script>
  <script src="vendor/xterm/addon-web-links.js"></script>
  <script src="lib/term.js"></script>
  <!-- v1.0.110 — Pack N: i18n (locales sotto window.LOCALES) -->
  <script src="locales/it.js"></script>
  <script src="locales/en.js"></script>
  <script src="tour.js"></script>
  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'">
  <title>CLACOROO — Claude Code Control Room</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="app-brand">
          <div class="brand-mascot" aria-hidden="true">
            <img class="mascot-base"  src="clacoroo.svg"       alt="" />
            <img class="mascot-blink" src="clacoroo-blink.svg" alt="" />
          </div>
          <div class="brand-text">
            <span class="brand-name">CLA<span class="brand-name-mark">CO</span>ROO</span>
            <span class="brand-subtitle">CLAude-code COntrol ROom</span>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-section="dashboard">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M3 4a1 1 0 000 2h14a1 1 0 100-2H3zm0 4a1 1 0 000 2h8a1 1 0 100-2H3zm0 4a1 1 0 000 2h5a1 1 0 100-2H3z"/></svg>
          Dashboard
        </button>
        <button class="nav-item" data-section="marketplaces">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C4.802 11.967 5.274 13 6 13h12a1 1 0 100-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3z"/><path d="M16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/></svg>
          Marketplace
        </button>
        <button class="nav-item" data-section="plugins">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M11 17a1 1 0 001.447.894l4-2A1 1 0 0017 15V9.236a1 1 0 00-1.447-.894l-4 2a1 1 0 00-.553.894V17zM15.211 6.276a1 1 0 000-1.788l-4.764-2.382a1 1 0 00-.894 0L4.789 4.488a1 1 0 000 1.788l4.764 2.382a1 1 0 00.894 0l4.764-2.382zM4.447 8.342A1 1 0 003 9.236V15a1 1 0 00.553.894l4 2A1 1 0 009 17v-5.764a1 1 0 00-.553-.894l-4-2z"/></svg>
          Plugin
          <span class="nav-badge" id="nav-badge-plugins"></span>
        </button>
        <button class="nav-item" data-section="skills">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
          Skill
        </button>
        <button class="nav-item" data-section="agents">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>
          Agent
        </button>
        <button class="nav-item" data-section="mcp">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M6 2a1 1 0 011 1v2h6V3a1 1 0 112 0v2h1a2 2 0 012 2v2a1 1 0 01-.293.707L14 13.414V17a2 2 0 01-2 2H8a2 2 0 01-2-2v-3.586L2.293 9.707A1 1 0 012 9V7a2 2 0 012-2h1V3a1 1 0 011-1zM4 7v1.586l3.707 3.707A1 1 0 018 13v4h4v-4a1 1 0 01.293-.707L16 8.586V7H4z"/></svg>
          MCP
        </button>
        <button class="nav-item" data-section="stats">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/></svg>
          Stats
        </button>
        <button class="nav-item" data-section="config">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M5 4a1 1 0 00-2 0v7.268a2 2 0 000 3.464V16a1 1 0 102 0v-1.268a2 2 0 000-3.464V4zM11 4a1 1 0 10-2 0v1.268a2 2 0 000 3.464V16a1 1 0 102 0V8.732a2 2 0 000-3.464V4zM16 3a1 1 0 011 1v7.268a2 2 0 010 3.464V16a1 1 0 11-2 0v-1.268a2 2 0 010-3.464V4a1 1 0 011-1z"/></svg>
          Config
        </button>
        <button class="nav-item" data-section="settings">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
          Impostazioni
        </button>
      </nav>

      <div class="sidebar-recent" id="sidebar-recent" aria-label="Attività recenti"></div>

      <div class="sidebar-account" id="sidebar-account" aria-label="Account Claude"></div>

      <div class="sidebar-footer">
        <div class="sidebar-status" id="sidebar-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-label">Caricamento…</span>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main-area">
      <header class="topbar" id="topbar">
        <div class="topbar-title" id="topbar-title">Dashboard</div>
        <div class="topbar-actions" id="topbar-actions"></div>
      </header>

      <div class="content-area" id="content-area">
        <div class="loading-screen" id="loading-screen">
          <img class="loading-mascot" src="clacoroo.svg" alt="" aria-hidden="true" />
          <p>CLACOROO sta accendendo la control room…</p>
        </div>
      </div>
    </main>
  </div>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
